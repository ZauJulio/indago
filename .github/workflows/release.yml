name: Release

# On every push to main: for each publishable package whose package.json version
# is not yet on the npm registry, publish it (npm CLI) and create the matching
# git tag + GitHub Release (e.g. `hyper-down-v0.4.1`). The registry check is the
# change gate: bumping a package's version is what releases it — packages whose
# current version is already published are skipped entirely, so touching only
# package A never re-tags or re-publishes package B. Re-runnable: already
# published versions / existing tags / existing releases are all skipped, so a
# rerun after fixing secrets is safe.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create tags + releases
  id-token: write # npm Trusted Publishing (OIDC) — mints the publish token

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: packages/HyperDown
            pkg: "@indago/hyper-down"
            tag_prefix: hyper-down-v
          - dir: packages/HyperJson
            pkg: "@indago/hyper-json"
            tag_prefix: hyper-json-v
          - dir: packages/scaffold
            pkg: "@indago/create-app"
            tag_prefix: create-app-v
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm (not bun) handles the publish; pin a Node whose npm we then upgrade
      # to one new enough for Trusted Publishing (OIDC needs npm >= 11.5.1).
      # NB: do NOT pass `registry-url` here — it writes an `_authToken=${NODE_AUTH_TOKEN}`
      # line to ~/.npmrc, and with no token that empty value makes npm attempt
      # (failed) token auth instead of the OIDC exchange. We set a token-less
      # registry in the publish step instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: meta
        working-directory: ${{ matrix.dir }}
        run: |
          VERSION=$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${{ matrix.tag_prefix }}$VERSION" >> "$GITHUB_OUTPUT"

      # The package only releases when its version was bumped — an unchanged
      # package's version is already on the registry and everything below skips.
      - name: Check if already published
        id: published
        run: |
          if npm view "${{ matrix.pkg }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag already exists
        id: tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.published.outputs.exists == 'false'
        working-directory: ${{ matrix.dir }}
        run: bun run build

      # Publish with NPM_TOKEN. Trusted Publishing (OIDC) is wired up — `id-token:
      # write` is granted and npm (>= 11.5.1) on the runner has the OIDC token —
      # but the registry rejects the identity (ENEEDAUTH) until the npm-side
      # Trusted Publisher entry matches this workflow's claim (repo ZauJulio/indago,
      # workflow filename `release.yml`, no environment). Once that matches, drop
      # the token + `.npmrc` line and `npm publish` alone publishes via OIDC.
      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\n' "$NODE_AUTH_TOKEN" > "$HOME/.npmrc"
          npm publish --access public

      # Tag/release only happen for a newly published version (or to repair a
      # half-finished previous run: published but tag/release missing).
      - name: Create tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          PKG: ${{ matrix.pkg }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_EXISTS: ${{ steps.tag.outputs.exists }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          if [ "$TAG_EXISTS" = "true" ]; then
            # Tag exists from a previous run — attach the release to it as-is.
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$PKG v$VERSION" \
              --notes "https://www.npmjs.com/package/$PKG/v/$VERSION"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$PKG v$VERSION" \
              --notes "https://www.npmjs.com/package/$PKG/v/$VERSION"
          fi
